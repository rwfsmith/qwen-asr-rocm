name: qwen-asr-rocm

# NOTE: vLLM backend is disabled — Triton attention kernels crash the ROCm
# driver on gfx1150 during encoder-cache profiling.  The ONNX/MIGraphX path
# uses a different execution engine that works on gfx1150.
# The vLLM Dockerfile and entrypoint are kept in the repo for future use.

services:
  # ── ONNX / MIGraphX backend ────────────────────────────────────────────────
  qwen-asr:
    build:
      context: ./onnx
      dockerfile: Dockerfile
      args:
        GPU_SUPPORT: "${GPU_SUPPORT:-rocm}"

    container_name: qwen-asr-onnx
    restart: unless-stopped

    user: root

    ports:
      - "8001:8001"

    devices:
      - /dev/dri
      - /dev/kfd

    group_add:
      - "${VIDEO_GID:-44}"
      - "${RENDER_GID:-109}"

    environment:
      - PYTHONUNBUFFERED=1
      - MODEL_NAME=${ONNX_MODEL_NAME:-andrewleech/qwen3-asr-0.6b-onnx-int8}
      - PROCESSOR_NAME=${PROCESSOR_NAME:-Qwen/Qwen3-ASR-0.6B}

    volumes:
      - ${QWEN_ASR_DATA_DIR:-./data}/models:/app/models
      - ${QWEN_ASR_DATA_DIR:-./data}/hf-cache:/root/.cache/huggingface

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  qwen-asr-wyoming:
    build:
      context: ./wyoming
      dockerfile: Dockerfile

    container_name: qwen-asr-wyoming
    restart: unless-stopped

    ports:
      - "10300:10300"

    depends_on:
      qwen-asr:
        condition: service_healthy

    command: >
      --asr-url http://qwen-asr:8001
      --model ${ONNX_MODEL_NAME:-andrewleech/qwen3-asr-0.6b-onnx-int8}
      --language ${ASR_LANGUAGE:-}
